<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="title">Restaurant</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <nav class="container">
    <div class="logo" id="logo">Restaurant</div>

    <ul id="navLinks">
      <li><a href="#menu">Menu</a></li>
      <li><a href="#reviews">Reviews</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>

    <div id="mobileMenu">☰</div>
  </nav>
</header>

<section class="hero">
  <div class="hero-content">
    <h1 id="hero-title">Restaurant Name</h1>
    <p>Order your favorite food online or call for quick pickup.</p>

    <div class="hero-buttons">
      <a href="#menu" class="btn">View Menu</a>
      <a id="callBtn" class="btn secondary">📞 Call Now</a>
    </div>
  </div>
</section>

<section id="menu" class="container">
  <h2>Menu</h2>
  <div class="menu-grid" id="menuItems"></div>
</section>

<section id="reviews" class="container">
  <h2>What Customers Say</h2>
  <div class="reviews">
    <div>⭐⭐⭐⭐⭐ Amazing food and atmosphere!</div>
    <div>⭐⭐⭐⭐⭐ Loved the service!</div>
    <div>⭐⭐⭐⭐⭐ Highly recommended!</div>
  </div>
</section>

<section id="contact" class="container">
  <h2>Visit Us</h2>

  <p id="address"></p>
  <p><a id="phone"></a></p>

  <iframe id="map"></iframe>
</section>

<a id="stickyCall" class="sticky-call">📞 Call Now</a>

<script src="script.js"></script>
</body>
</html>
